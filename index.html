<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Eternal Vows | Matthew & Victoria</title>
    <!-- Google Fonts: Elegant Serif + Soft Sans + Handwritten -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fef7f0;
            color: #3e2c2a;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Typography */
        h1, h2, h3, .serif-heading {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .handwritten {
            font-family: 'Great Vibes', cursive;
            font-weight: 400;
        }

        /* MAIN WEBSITE (hidden until intro ends) */
        .main-site {
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.2s ease-in-out;
        }

        .main-site.visible {
            opacity: 1;
            visibility: visible;
        }

        /* INTRO SECTION */
        #intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #0f0a0a;
            background: radial-gradient(circle at center, #2a1e1a, #0a0705);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #f9e5cf;
            transition: opacity 1s ease, visibility 0s 1s;
        }

        #intro.fade-out {
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease, visibility 0s 1s;
        }

        .particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .flower-canvas {
            width: 220px;
            height: 220px;
            margin-bottom: 2rem;
            z-index: 2;
        }

        .intro-text-container {
            text-align: center;
            margin-top: 2rem;
            font-size: 1.6rem;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 2px;
            font-weight: 300;
            text-shadow: 0 0 12px rgba(255,215,175,0.8);
        }

        .intro-line {
            min-height: 80px;
        }

        /* Sections general */
        section {
            padding: 100px 24px;
            position: relative;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* Hero */
        .hero {
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80') center/cover fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(to top, #fef7f0, transparent);
            pointer-events: none;
        }

        .hero-content {
            background: rgba(255,245,235,0.75);
            backdrop-filter: blur(8px);
            padding: 3rem 2rem;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: 0 20px;
        }

        .hero-content h1 {
            font-size: 4.5rem;
            letter-spacing: 4px;
            color: #c6a16e;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.1);
        }

        .hero-date {
            font-size: 1.5rem;
            border-top: 1px solid #d4b48c;
            display: inline-block;
            padding-top: 0.8rem;
        }

        .countdown-timer {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            margin: 2rem 0;
            flex-wrap: wrap;
        }
        .time-card {
            background: white;
            padding: 1rem 1.2rem;
            border-radius: 18px;
            min-width: 90px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .time-number {
            font-size: 2.5rem;
            font-weight: 600;
            color: #bd8a5a;
            font-family: 'Cormorant Garamond', serif;
        }

        .btn-save, .btn-arrow {
            background: #c6a16e;
            border: none;
            color: white;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin: 0.5rem;
        }

        /* Calendar buttons */
        .calendar-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 1rem 0 2rem;
        }
        .cal-btn {
            background: #f2e3d5;
            padding: 10px 20px;
            border-radius: 50px;
            color: #6a4e3a;
            font-weight: 500;
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid #e7cfbb;
        }

        /* Timeline */
        .timeline {
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .timeline-item {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            background: rgba(255,250,240,0.8);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .timeline-icon i {
            font-size: 2.5rem;
            color: #c6a16e;
        }
        /* Gallery grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .gallery-item {
            overflow: hidden;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .gallery-item img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.05);
        }
        /* Lightbox */
        .lightbox {
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        /* Video */
        .video-container {
            position: relative;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 35px -10px rgba(0,0,0,0.2);
        }
        video {
            width: 100%;
            display: block;
        }
        .play-overlay {
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            cursor: pointer;
        }
        /* RSVP */
        .rsvp-form .input-group {
            margin-bottom: 24px;
            position: relative;
        }
        .rsvp-form input, .rsvp-form select, .rsvp-form textarea {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #e4cfbc;
            background: white;
            border-radius: 28px;
            font-family: 'Montserrat', sans-serif;
            transition: 0.2s;
        }
        /* Floating music btn */
        .music-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #fff0e3;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            cursor: pointer;
            z-index: 999;
            backdrop-filter: blur(8px);
            transition: 0.2s;
        }
        /* floating petals */
        .petal {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.7;
        }
        footer {
            background: #2c1e1a;
            color: #e9cfb5;
            text-align: center;
            padding: 3rem 1rem;
        }
        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2.8rem; }
            .timeline-item { flex-direction: column; }
        }
        .glow {
            animation: glowPulse 2s infinite;
        }
        @keyframes glowPulse {
            0% { text-shadow: 0 0 0px rgba(198,161,110,0.5); }
            100% { text-shadow: 0 0 15px rgba(198,161,110,0.9); }
        }
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.7s ease;
        }
        .fade-up.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

<!-- INTRO SECTION -->
<div id="intro">
    <canvas id="particlesCanvas" class="particles-canvas"></canvas>
    <canvas id="flowerCanvas" class="flower-canvas" width="300" height="300"></canvas>
    <div class="intro-text-container">
        <div class="intro-line" id="introLine"></div>
    </div>
</div>

<!-- MAIN WEBSITE -->
<div class="main-site" id="mainSite">
    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="hero-content">
            <h1 class="handwritten" style="font-size:3.5rem;">Matthew & Victoria</h1>
            <div style="margin: 0.5rem 0;"><i class="fas fa-ring" style="color:#c6a16e;"></i></div>
            <p class="serif-heading" style="font-size:1.6rem;">We're getting married</p>
            <p class="hero-date">June 14, 2026 — 4:30 PM</p>
            <div id="countdownDisplay" class="countdown-timer"></div>
            <div>
                <button id="saveDateBtn" class="btn-save"><i class="fas fa-heart"></i> Save The Date</button>
                <a href="#timeline" class="btn-arrow"><i class="fas fa-arrow-down"></i></a>
            </div>
        </div>
    </section>

    <!-- Calendar Buttons Section (Save The Date) -->
    <div class="container" style="text-align:center; margin-top:-50px;">
        <div class="calendar-buttons" id="calendarBtns">
            <button class="cal-btn" id="googleCal"><i class="fab fa-google"></i> Google</button>
            <button class="cal-btn" id="appleCal"><i class="fab fa-apple"></i> Apple Calendar</button>
            <button class="cal-btn" id="outlookCal"><i class="fas fa-calendar-alt"></i> Outlook</button>
        </div>
    </div>

    <!-- Timeline Section -->
    <section id="timeline">
        <div class="container">
            <h2 class="serif-heading" style="font-size:3rem; text-align:center; margin-bottom:2rem;">Wedding Timeline</h2>
            <div class="timeline" id="timelineList"></div>
        </div>
    </section>

    <!-- Couple Story -->
    <section id="story" style="background: #fff9f3;">
        <div class="container">
            <h2 class="serif-heading" style="font-size:3rem; text-align:center;">Our Journey</h2>
            <div class="story-timeline" id="storyContainer"></div>
        </div>
    </section>

    <!-- Gallery -->
    <section id="gallery">
        <div class="container">
            <h2 class="serif-heading" style="font-size:3rem; text-align:center;">Romantic Gallery</h2>
            <div class="gallery-grid" id="galleryGrid"></div>
        </div>
    </section>

    <!-- Video Section -->
    <section id="videoSection" style="background: #f6ede4;">
        <div class="container">
            <h2 class="serif-heading" style="font-size:3rem; text-align:center;">Cinematic Moments</h2>
            <div class="video-container" id="videoWrapper">
                <video id="weddingVideo" poster="https://images.unsplash.com/photo-1519741497674-611481863552?w=800" preload="metadata">
                    <source src="https://assets.mixkit.co/videos/preview/mixkit-wedding-couple-embracing-1377-large.mp4" type="video/mp4">
                </video>
                <div class="play-overlay" id="playOverlay">
                    <i class="fas fa-play-circle" style="font-size: 64px; color: #fff9f0; filter: drop-shadow(0 2px 8px black);"></i>
                </div>
            </div>
        </div>
    </section>

    <!-- RSVP Form -->
    <section id="rsvp">
        <div class="container">
            <h2 class="serif-heading" style="font-size:3rem; text-align:center;">Kindly Reply</h2>
            <form id="rsvpForm" class="rsvp-form" style="max-width:700px; margin:0 auto;">
                <div class="input-group"><input type="text" id="fullName" placeholder="Full Name" required></div>
                <div class="input-group"><input type="email" id="email" placeholder="Email Address" required></div>
                <div class="input-group"><input type="number" id="guests" placeholder="Number of Guests" min="1"></div>
                <div class="input-group"><select id="attendance"><option value="yes">Joyfully Attending</option><option value="no">Regretfully Declining</option></select></div>
                <div class="input-group"><select id="meal"><option value="standard">Champagne Dinner</option><option value="veg">Vegetarian Delight</option></select></div>
                <div class="input-group"><textarea id="message" rows="3" placeholder="Your warm wishes..."></textarea></div>
                <button type="submit" class="btn-save" style="width:100%;">Send RSVP <i class="fas fa-feather-alt"></i></button>
            </form>
        </div>
    </section>

    <footer>
        <p><i class="fas fa-map-marker-alt"></i> Château Étoilé, 123 Romance Lane, Provence, France</p>
        <p><i class="fas fa-envelope"></i> rsvp@matthewandvictoria.com</p>
        <div style="margin:1rem 0;"><i class="fab fa-instagram"></i> <i class="fab fa-facebook"></i> <i class="fab fa-pinterest"></i></div>
        <p class="handwritten" style="font-size:1.3rem;">Thank you for celebrating our love story.</p>
    </footer>
</div>

<!-- Floating Music Control -->
<div class="music-btn" id="musicToggle">
    <i class="fas fa-music" id="musicIcon"></i>
</div>
<script>
    // ----------------------- DATA -----------------------
    const weddingDate = new Date(2026, 8, 18, 17, 0, 0); // September 18 2026 5:00 PM
    
    // Timeline items
// ---------------- STORY SECTION ----------------
const storySteps = [
    {
        year: "2018",
        title: "The First Meeting",
        desc: "Lucas and Isabella met during an art exhibition in Florence. A simple conversation turned into hours of laughter and connection."
    },
    {
        year: "2019",
        title: "Falling In Love",
        desc: "Weekend coffee dates became unforgettable adventures across Europe, creating memories they would cherish forever."
    },
    {
        year: "2021",
        title: "Moving Together",
        desc: "The couple moved into their first apartment together and started building their dream life side by side."
    },
    {
        year: "2024",
        title: "The Proposal",
        desc: "On a romantic evening by Lake Como, Lucas got down on one knee under thousands of fairy lights."
    },
    {
        year: "2026",
        title: "Forever Begins",
        desc: "Surrounded by family and friends, they celebrate the beginning of their forever journey together."
    }
];

// ---------------- TIMELINE SECTION ----------------
const timelineEvents = [
    {
        icon: "fas fa-glass-cheers",
        time: "4:00 PM",
        title: "Guest Arrival",
        desc: "Welcome drinks, live piano music, and beautiful sunset views."
    },
    {
        icon: "fas fa-ring",
        time: "5:00 PM",
        title: "Wedding Ceremony",
        desc: "The exchange of vows beneath a floral arch overlooking the lake."
    },
    {
        icon: "fas fa-camera",
        time: "6:00 PM",
        title: "Photography Session",
        desc: "Capturing timeless moments with the bride, groom, family, and friends."
    },
    {
        icon: "fas fa-utensils",
        time: "7:00 PM",
        title: "Dinner Reception",
        desc: "A luxury dining experience with speeches, laughter, and celebration."
    },
    {
        icon: "fas fa-cake-candles",
        time: "8:30 PM",
        title: "Cake Cutting",
        desc: "A sweet moment shared together with champagne and music."
    },
    {
        icon: "fas fa-music",
        time: "9:00 PM",
        title: "First Dance",
        desc: "The couple's magical first dance surrounded by candlelight."
    },
    {
        icon: "fas fa-champagne-glasses",
        time: "10:00 PM",
        title: "After Party",
        desc: "DJ, dancing, fireworks, and unforgettable memories until midnight."
    }
];
    
    const galleryImages = [
        "https://images.unsplash.com/photo-1519741497674-611481863552?w=600",
        "https://images.unsplash.com/photo-1522673607200-164d1b6ce486?w=600",
        "https://images.unsplash.com/photo-1529636798458-92182e662485?w=600",
        "https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=600",
        "https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=600",
        "https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=600"
    ];
    
    // Generate HTML
    function buildTimeline() {
        const container = document.getElementById('timelineList');
        container.innerHTML = timelineEvents.map(ev => `
            <div class="timeline-item fade-up">
                <div class="timeline-icon"><i class="${ev.icon}"></i></div>
                <div><h3>${ev.title} · ${ev.time}</h3><p>${ev.desc}</p></div>
            </div>
        `).join('');
    }
    function buildStory() {
        const container = document.getElementById('storyContainer');
        container.innerHTML = storySteps.map((step, idx) => `
            <div class="timeline-item fade-up" style="flex-direction: ${idx%2===0?'row':'row-reverse'}; text-align:${idx%2===0?'left':'right'}; justify-content:space-between;">
                <div><h2 class="handwritten" style="font-size:2rem;">${step.year}</h2><h3>${step.title}</h3><p>${step.desc}</p></div>
                <div><i class="fas fa-heart" style="color:#c6a16e; font-size:2rem;"></i></div>
            </div>
        `).join('');
    }
    function buildGallery() {
        const grid = document.getElementById('galleryGrid');
        grid.innerHTML = galleryImages.map(src => `<div class="gallery-item"><img src="${src}" alt="romantic wedding"></div>`).join('');
        // Lightbox init
        document.querySelectorAll('.gallery-item').forEach((item, idx) => {
            item.addEventListener('click', () => {
                const lb = document.createElement('div'); lb.className = 'lightbox';
                lb.innerHTML = `<img src="${galleryImages[idx]}" style="max-width:90%; max-height:80%; border-radius:20px;"><i class="fas fa-times" style="position:absolute; top:30px; right:30px; color:white; font-size:32px; cursor:pointer;"></i>`;
                document.body.appendChild(lb);
                lb.style.display = 'flex';
                lb.addEventListener('click', (e) => { if(e.target !== lb.querySelector('img')) lb.remove(); });
            });
        });
    }
    
    // Countdown Timer
    function updateCountdown() {
        const now = new Date().getTime();
        const diff = weddingDate - now;
        if(diff <= 0) { document.getElementById('countdownDisplay').innerHTML = "<span>Our special day has arrived!</span>"; return; }
        const days = Math.floor(diff/(1000*60*60*24));
        const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
        const minutes = Math.floor((diff%(1000*60*60))/(1000*60));
        const seconds = Math.floor((diff%(1000*60))/1000);
        document.getElementById('countdownDisplay').innerHTML = `
            <div class="time-card"><div class="time-number">${days}</div><div>Days</div></div>
            <div class="time-card"><div class="time-number">${hours}</div><div>Hours</div></div>
            <div class="time-card"><div class="time-number">${minutes}</div><div>Minutes</div></div>
            <div class="time-card"><div class="time-number">${seconds}</div><div>Seconds</div></div>
        `;
    }
    setInterval(updateCountdown, 1000);
    
    // Calendar links
    // Event details
    function getEventDetails() {
        const start = weddingDate;
        const end = new Date(start.getTime() + 6 * 60 * 60 * 1000);

        const title = "Lucas & Isabella Wedding Celebration";
        const desc = "Join us for an unforgettable evening filled with love, music, laughter and celebration.";
        const location = "Villa Amore, Lake Como, Italy";

        return { start, end, title, desc, location };
    }
    function generateGoogleCal() {
        const { start, end, title, desc, location } = getEventDetails();
        const startStr = start.toISOString().replace(/-|:|\.\d+/g, '');
        const endStr = end.toISOString().replace(/-|:|\.\d+/g, '');
        const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${startStr}/${endStr}&details=${encodeURIComponent(desc)}&location=${encodeURIComponent(location)}`;
        window.open(url, '_blank');
    }
    function downloadICS() {
        const { start, end, title, desc, location } = getEventDetails();
        const format = (d) => d.toISOString().replace(/-|:|\.\d+/g, '');
        const icsContent = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Wedding//EN
BEGIN:VEVENT
UID:${Date.now()}@matthewvictoria
DTSTAMP:${format(new Date())}
DTSTART:${format(start)}
DTEND:${format(end)}
SUMMARY:${title}
DESCRIPTION:${desc}
LOCATION:${location}
END:VEVENT
END:VCALENDAR`;
        const blob = new Blob([icsContent], {type: 'text/calendar'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'wedding_invite.ics';
        link.click();
        URL.revokeObjectURL(link.href);
    }
    document.getElementById('googleCal')?.addEventListener('click', generateGoogleCal);
    document.getElementById('appleCal')?.addEventListener('click', downloadICS);
    document.getElementById('outlookCal')?.addEventListener('click', downloadICS);
    
    // Intro Animation: Flower Canvas + Letter by Letter + Particles
    let introActive = true;
    const introDiv = document.getElementById('intro');
    const mainSite = document.getElementById('mainSite');
    const flowerCanvas = document.getElementById('flowerCanvas');
    const ctxFlower = flowerCanvas.getContext('2d');
    let growth = 0;
    let animFrame;
       // Intro typing animation texts
    const texts = [
        "Two Hearts, One Forever",
        "Every Love Story Is Beautiful, Ours Is Our Favorite",
        "Together Is A Wonderful Place To Be"
    ];
    let textIndex = 0, charIndex = 0;
    const introLine = document.getElementById('introLine');
    function typeEffect() {
        if(textIndex >= texts.length) { setTimeout(() => finishIntro(), 1200); return; }
        const fullText = texts[textIndex];
        if(charIndex <= fullText.length) {
            introLine.innerHTML = fullText.substring(0, charIndex) + (charIndex%2===0?'_':' ');
            charIndex++;
            setTimeout(typeEffect, 85);
        } else {
            setTimeout(() => { charIndex=0; textIndex++; typeEffect(); }, 800);
        }
    }
    function drawFlower(g) {
        const w=300, h=300;
        ctxFlower.clearRect(0,0,w,h);
        ctxFlower.save();
        ctxFlower.translate(150, 200);
        let stemH = 60 * g;
        ctxFlower.beginPath();
        ctxFlower.moveTo(0,0);
        ctxFlower.lineTo(0, -stemH);
        ctxFlower.lineWidth = 4;
        ctxFlower.strokeStyle = "#b3a06e";
        ctxFlower.stroke();
        let petalsCount = 8;
        let petalSize = 20 * Math.min(1, g*1.2);
        for(let i=0; i<petalsCount; i++) {
            let angle = (i/petalsCount)*Math.PI*2;
            let xOff = Math.cos(angle)*petalSize;
            let yOff = Math.sin(angle)*petalSize - stemH*0.7;
            ctxFlower.beginPath();
            ctxFlower.ellipse(xOff, yOff, petalSize*0.7, petalSize*1.2, angle, 0, 2*Math.PI);
            ctxFlower.fillStyle = `rgba(255, 215, 175, ${Math.min(1,g*1.2)})`;
            ctxFlower.fill();
            ctxFlower.fillStyle = "#f5d0a9";
        }
        ctxFlower.beginPath();
        ctxFlower.arc(0, -stemH*0.7, 12, 0, 2*Math.PI);
        ctxFlower.fillStyle = "#e6b56e";
        ctxFlower.fill();
        ctxFlower.restore();
    }
    let startGrowth;
    function growFlower(timestamp) {
        if(!startGrowth) startGrowth = timestamp;
        const elapsed = (timestamp - startGrowth) / 1500;
        growth = Math.min(1, elapsed);
        drawFlower(growth);
        if(growth < 1) requestAnimationFrame(growFlower);
        else { drawFlower(1); }
    }
    function finishIntro() {
        if(introDiv) {
            introDiv.classList.add('fade-out');
            setTimeout(() => {
                introDiv.style.display = 'none';
                mainSite.classList.add('visible');
                // start background music attempt
                playMusicOnInteraction();
            }, 1000);
        }
    }
    // Particles
    const partCanvas = document.getElementById('particlesCanvas');
    let pCtx = partCanvas.getContext('2d');
    let particles = [];
    function resizeCanvas() {
        partCanvas.width = window.innerWidth;
        partCanvas.height = window.innerHeight;
    }
    function initParticles() {
        resizeCanvas();
        for(let i=0;i<70;i++) {
            particles.push({x:Math.random()*partCanvas.width, y:Math.random()*partCanvas.height, radius:Math.random()*2+1, alpha:Math.random()*0.6, dx:(Math.random()-0.5)*0.3, dy:(Math.random()-0.5)*0.2});
        }
        function drawParticles() {
            if(!pCtx) return;
            pCtx.clearRect(0,0,partCanvas.width,partCanvas.height);
            particles.forEach(p => {
                pCtx.beginPath();
                pCtx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                pCtx.fillStyle = `rgba(255,225,180,${p.alpha})`;
                pCtx.fill();
                p.x += p.dx; p.y += p.dy;
                if(p.x<0) p.x=partCanvas.width; if(p.x>partCanvas.width) p.x=0;
                if(p.y<0) p.y=partCanvas.height; if(p.y>partCanvas.height) p.y=0;
            });
            requestAnimationFrame(drawParticles);
        }
        drawParticles();
    }
    window.addEventListener('resize', () => { if(partCanvas) resizeCanvas(); });
    initParticles();
    requestAnimationFrame(growFlower);
    typeEffect();
    
    // Music with autoplay fallback (soft instrumental from pixabay royalty-free)
    const audio = new Audio('https://cdn.pixabay.com/download/audio/2022/03/10/audio_11c5a2e4d7.mp3?filename=romantic-piano-116339.mp3');
    audio.loop = true;
    audio.volume = 0.3;
    let musicPlaying = false;
    const musicIcon = document.getElementById('musicIcon');
    function playMusicOnInteraction() {
        audio.play().then(() => {
            musicPlaying = true;
            musicIcon.className = 'fas fa-music';
        }).catch(() => { musicPlaying = false; musicIcon.className = 'fas fa-volume-mute'; });
    }
    document.getElementById('musicToggle').addEventListener('click', () => {
        if(musicPlaying) { audio.pause(); musicPlaying=false; musicIcon.className = 'fas fa-volume-mute'; }
        else { audio.play().catch(e=>console.log); musicPlaying=true; musicIcon.className = 'fas fa-music'; }
    });
    // Auto start after first user gesture – but we also try on intro click, and after fade
    const tryAuto = () => { playMusicOnInteraction(); document.removeEventListener('click', tryAuto); document.removeEventListener('touchstart', tryAuto); };
    document.addEventListener('click', tryAuto);
    document.addEventListener('touchstart', tryAuto);
    setTimeout(() => { if(!musicPlaying) playMusicOnInteraction(); }, 2000);
    
    // video play overlay
    const video = document.getElementById('weddingVideo');
    const overlay = document.getElementById('playOverlay');
    overlay.addEventListener('click', () => {
        if(video.paused) { video.play(); overlay.style.opacity='0'; }
        else { video.pause(); overlay.style.opacity='1'; }
    });
    video.addEventListener('pause', () => overlay.style.opacity='1');
    video.addEventListener('play', () => overlay.style.opacity='0');
    
    // RSVP validation
    const rsvpForm = document.getElementById('rsvpForm');
    rsvpForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        if(!name || !email) { alert("Please provide name and email."); return; }
        alert(`✨ Thank you, ${name}! Your presence means the world. ✨`);
        rsvpForm.reset();
    });
    // Intersection Observer animations
    const faders = document.querySelectorAll('.fade-up');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('visible'); });
    }, { threshold: 0.2 });
    document.querySelectorAll('.timeline-item, .story-timeline .timeline-item, .gallery-item').forEach(el => { el.classList.add('fade-up'); observer.observe(el); });
    buildTimeline(); buildStory(); buildGallery(); updateCountdown();
    // save the date button smooth scroll to calendar buttons
    document.getElementById('saveDateBtn')?.addEventListener('click', () => { document.getElementById('calendarBtns').scrollIntoView({ behavior: 'smooth' }); });
    // floating petals animation
    function createPetal() { const petal = document.createElement('div'); petal.classList.add('petal'); petal.innerHTML = '<i class="fas fa-leaf" style="color:#f5cfb3;"></i>'; document.body.appendChild(petal); petal.style.position='fixed'; petal.style.left=Math.random()*window.innerWidth+'px'; petal.style.top='-20px'; petal.style.opacity=Math.random()*0.6+0.2; let pos=-20; const interval=setInterval(()=>{ pos+=2; petal.style.top=pos+'px'; petal.style.transform=`rotate(${pos}deg)`; if(pos>window.innerHeight){ clearInterval(interval); petal.remove(); } }, 30); setTimeout(()=>{ if(petal) petal.remove(); clearInterval(interval); }, 10000); } setInterval(createPetal, 1800);
    // extra smooth reveal
    const heroBtn = document.querySelector('.btn-arrow');
    if(heroBtn) heroBtn.addEventListener('click', (e) => { e.preventDefault(); document.getElementById('timeline').scrollIntoView({ behavior: 'smooth' }); });

        document.querySelector("footer").innerHTML = `
        <p><i class="fas fa-map-marker-alt"></i> Villa Amore, Lake Como, Italy</p>
        <p><i class="fas fa-envelope"></i> forever@lucasisabella.com</p>
        <div style="margin:1rem 0;">
            <i class="fab fa-instagram"></i>
            <i class="fab fa-facebook"></i>
            <i class="fab fa-pinterest"></i>
        </div>
        <p class="handwritten" style="font-size:1.3rem;">
            Thank you for being part of our forever story.
        </p>
    `;
</script>
